name: Daily Production Dry Run

on:
  schedule:
    # 10:00 Africa/Lagos is 09:00 UTC.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      daily_input_path:
        description: "Daily Input JSON path"
        required: false
        default: "editorial-brain/examples/liverpool-arsenal-daily-input.json"

jobs:
  daily-dry-run:
    name: Build package and request approval
    runs-on: ubuntu-latest
    env:
      INSIGHT_FOOTBALL_ENV: production
      INSIGHT_FOOTBALL_DRY_RUN: "true"
      INSIGHT_FOOTBALL_REQUIRE_HUMAN_APPROVAL: "true"
      DAILY_INPUT_PATH: ${{ github.event.inputs.daily_input_path || 'editorial-brain/examples/liverpool-arsenal-daily-input.json' }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      APP_FOOTBALL_API_KEY: ${{ secrets.APP_FOOTBALL_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_APPROVAL_CHAT_ID: ${{ secrets.TELEGRAM_APPROVAL_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run regression tests
        run: python scripts/run_tests.py

      - name: Run daily dry-run production
        run: python scripts/run_daily_dry_run.py --daily-input "$DAILY_INPUT_PATH"

      - name: Send Telegram approval request
        run: python scripts/send_telegram_approval.py --run-url "$GITHUB_RUN_URL"

      - name: Upload approval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: insight-football-approval-package
          path: |
            editorial-brain/output/daily-run-report.json
            editorial-brain/output/publish-ready-package.json
            editorial-brain/output/publish_readiness_report.json
            editorial-brain/output/publishing_report.json
            editorial-brain/output/published-package.json
            editorial-brain/output/learning-package.json
          if-no-files-found: warn

