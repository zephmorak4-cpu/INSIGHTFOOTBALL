services:
  - type: worker
    name: insight-football-clean-mvp
    runtime: python
    repo: https://github.com/zephmorak4-cpu/INSIGHTFOOTBALL.git
    branch: main
    plan: starter
    region: oregon
    buildCommand: "python -m pip install --upgrade pip && python -m pip install -r requirements.txt"
    startCommand: "python -m app.telegram.polling"
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: OPENAI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_APPROVAL_CHAT_ID
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
      - key: APP_FOOTBALL_API_KEY
        sync: false
      - key: API_FOOTBALL_API_KEY
        sync: false
      - key: FOOTBALL_API_BASE_URL
        value: https://v3.football.api-sports.io
      - key: NEWS_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: DATA_DIR
        value: data
