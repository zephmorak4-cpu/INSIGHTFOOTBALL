services:
  - type: cron
    name: insight-football-daily-production
    runtime: python
    repo: https://github.com/zephmorak4-cpu/INSIGHTFOOTBALL.git
    branch: main
    plan: starter
    region: oregon
    schedule: "0 9 * * *"
    buildCommand: "python -m pip install --upgrade pip && python -m pip install -r requirements.txt"
    startCommand: "python scripts/render_daily_entrypoint.py"
    envVars:
      - key: INSIGHT_FOOTBALL_ENV
        value: production
      - key: INSIGHT_FOOTBALL_DRY_RUN
        value: "true"
      - key: INSIGHT_FOOTBALL_REQUIRE_HUMAN_APPROVAL
        value: "true"
      - key: PRODUCTION_REQUIRES_EDITOR_SELECTION
        value: "true"
      - key: ALLOW_AUTOMATIC_MATCH_SELECTION_IN_PRODUCTION
        value: "false"
      - key: ALLOW_MATCH_SELECTOR_FALLBACK
        value: "false"
      - key: INSIGHT_FOOTBALL_RENDERER_PROFILE
        value: creatomate
      - key: INSIGHT_FOOTBALL_RENDER_AUDIO_MODE
        value: silent
      - key: DAILY_INPUT_PATH
        value: editorial-brain/examples/liverpool-arsenal-daily-input.json
      - key: INSIGHT_FOOTBALL_RUN_TESTS_ON_RENDER
        value: "false"
      - key: FFMPEG_BINARY_PATH
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_FOOTBALL_API_KEY
        sync: false
      - key: API_FOOTBALL_API_KEY
        sync: false
      - key: FOOTBALL_API_BASE_URL
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_APPROVAL_CHAT_ID
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: CREATOMATE_API_KEY
        sync: false
      - key: CREATOMATE_TEMPLATE_ID
        sync: false
      - key: CREATOMATE_TEMPLATE_OPENING_STING
        sync: false
      - key: CREATOMATE_TEMPLATE_MATCH_INTRO
        sync: false
      - key: CREATOMATE_TEMPLATE_CENTRAL_QUESTION
        sync: false
      - key: CREATOMATE_TEMPLATE_EVIDENCE_CARD
        sync: false
      - key: CREATOMATE_TEMPLATE_TACTICAL_BOARD
        sync: false
      - key: CREATOMATE_TEMPLATE_TEAM_COMPARISON
        sync: false
      - key: CREATOMATE_TEMPLATE_DASHBOARD
        sync: false
      - key: CREATOMATE_TEMPLATE_CTA
        sync: false
      - key: CREATOMATE_TEMPLATE_CLOSING_STING
        sync: false
      - key: EDITOR_SELECTION_PATH
        sync: false
